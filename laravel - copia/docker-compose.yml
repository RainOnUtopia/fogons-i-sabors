version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fogonsisabors_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-fogonsisabors}
      - DB_USERNAME=${DB_USERNAME:-fogonsisabors}
      - DB_PASSWORD=${DB_PASSWORD:-fogonsisabors}
    networks:
      - laravel
    depends_on:
      - db

  node:
    image: node:20-alpine
    container_name: fogonsisabors_node
    working_dir: /var/www/html
    # Iniciem el servidor de Vite, exposant-lo a totes les interfícies de xarxa perquè pugui ser consultat des de l'amfitrió
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: fogonsisabors_db
    restart: unless-stopped
    ports:
      # Exposem el port a l'amfitrió, canviat a 33060 per evitar conflictes amb el MySQL local
      - "33060:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-fogonsisabors}
      MYSQL_USER: ${DB_USERNAME:-fogonsisabors}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fogonsisabors}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-fogonsisabors}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: fogonsisabors_phpmyadmin
    restart: unless-stopped
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=${DB_USERNAME:-fogonsisabors}
      - PMA_PASSWORD=${DB_PASSWORD:-fogonsisabors}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - laravel

  mailpit:
    image: axllent/mailpit
    container_name: fogonsisabors_mailpit
    ports:
      - "8025:8025" # interfaz web
      - "1025:1025" # SMTP
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  dbdata:
