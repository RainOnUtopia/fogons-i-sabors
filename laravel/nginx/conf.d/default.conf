server {
    listen 80;
    server_name fogonsisabors.com www.fogonsisabors.com;
    
    # Redirigim tot el tràfic HTTP cap a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fogonsisabors.com www.fogonsisabors.com;

    # Certificats SSL auto-signats generats per l'script de desplegament
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Arrel de public de laravel
    root /var/www/html/public;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Anem al contenidor app, port 9000
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Deneguem accés a arxius ocults (com .env)
    location ~ /\.ht {
        deny all;
    }
}
